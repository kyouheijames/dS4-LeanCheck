name = "ds4_verification"
defaultTargets = ["Ds4Verification"]

# Mathlib is pinned to a release tag whose Lean toolchain MUST match `lean-toolchain`.
# If `lake exe cache get` reports a mismatch, either:
#   1. bump both this `rev` and `lean-toolchain` to the same Mathlib release, or
#   2. set rev = "main" and run `lake update` (then `lake exe cache get`).
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.15.0"

[[lean_lib]]
name = "Ds4Verification"
